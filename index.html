<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANG NANG 10 | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --red: #8F0C0C; --black: #0d0d0d; }
        body { background-color: var(--black); color: white; font-family: 'Sarabun', sans-serif; }
        .font-cinema { font-family: 'Cinzel', serif; }
        .movie-card { background: #151515; border: 1px solid #333; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .movie-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .btn-gold { background-color: var(--gold); color: black; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="p-6 bg-black flex justify-center items-center gap-6 md:gap-12 border-b border-gray-800 shadow-2xl">
        <img src="logo-uni.png" onerror="this.style.display='none'" class="h-10 md:h-14 object-contain" alt="University">
        <img src="logo-major.png" onerror="this.style.display='none'" class="h-10 md:h-14 object-contain" alt="Major">
        <img src="logo-group.png" onerror="this.style.display='none'" class="h-10 md:h-14 object-contain" alt="Group">
    </header>

    <section class="py-16 text-center">
        <h1 class="font-cinema text-5xl md:text-7xl text-[--gold] mb-4 drop-shadow-2xl">WANG NANG 10</h1>
        <p class="text-gray-400 tracking-[0.4em] uppercase text-[10px] md:text-sm">The Decade of Cinematic Excellence</p>
    </section>

    <main class="max-w-7xl mx-auto px-6">
        <h2 class="text-xl font-bold mb-10 border-l-4 border-[--red] pl-4 uppercase tracking-widest">Official Selection</h2>
        <div id="movie-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="booking-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#1a1a1a] w-full max-w-md p-8 rounded-2xl border border-[--gold]">
            <h2 id="modal-title" class="text-2xl font-bold text-[--gold] mb-6 text-center"></h2>
            <form onsubmit="confirmBooking(event)" class="space-y-4">
                <input type="text" id="user_name" placeholder="ชื่อจริง - นามสกุล" required class="w-full bg-black border border-gray-700 p-4 rounded-xl outline-none focus:border-[--gold] text-white">
                <input type="tel" id="user_phone" placeholder="เบอร์โทรศัพท์" required class="w-full bg-black border border-gray-700 p-4 rounded-xl outline-none focus:border-[--gold] text-white">
                <button type="submit" class="w-full btn-gold py-4 rounded-xl uppercase shadow-lg">ยืนยันการจองตั๋ว</button>
                <button type="button" onclick="closeModal()" class="w-full text-gray-500 mt-2 text-sm">ยกเลิก</button>
            </form>
        </div>
    </div>

    <script>
        const movies = [
            { id: 1, title: "Lusso & Piero", prod: "Cloudframe Studio", time: "15 นาที", desc: "เรื่องราวของจิตรกรหนุ่มผู้หลงใหลในแสงและเงา" },
            { id: 2, title: "ฮอยขวัญ", prod: "Zumzam Prod.", time: "18 นาที", desc: "หนังสยองขวัญพื้นบ้าน เมื่อพิธีกรรมเรียกขวัญนำพาสิ่งไม่คาดฝัน" },
            { id: 3, title: "UNEARTH", prod: "MMRS Production", time: "20 นาที", desc: "การขุดค้นทางโบราณคดีที่นำไปสู่ความลับอันน่าสะพรึงกลัว" },
            { id: 4, title: "Echoes of Silence", prod: "Silent Hill", time: "12 นาที", desc: "สารคดีสะท้อนชีวิตคนไร้บ้านในเมืองหลวง" },
            { id: 5, title: "The Last Frame", prod: "Retro Lens", time: "15 นาที", desc: "ชายชราผู้ดูแลโรงหนังเก่ากับหนังม้วนสุดท้าย" },
            { id: 6, title: "Melody of June", prod: "Harmony Film", time: "14 นาที", desc: "ความรักที่จืดจางลงในฤดูฝนกับเสียงเปียโน" },
            { id: 7, title: "Neon Nights", prod: "Cyber City", time: "16 นาที", desc: "ไซไฟระทึกขวัญใต้แสงสีนีออน" },
            { id: 8, title: "กลิ่นดอกมะลิ", prod: "Jasmine House", time: "18 นาที", desc: "ดราม่าครอบครัวผ่านรสชาติอาหารไทย" },
            { id: 9, title: "Under the Mask", prod: "Theater Arts", time: "15 นาที", desc: "เบื้องหลังเวทีโขนที่เต็มไปด้วยความริษยา" },
            { id: 10, title: "Parallel", prod: "Paradox Film", time: "17 นาที", desc: "โลกคู่ขนานที่เชื่อมต่อผ่านตู้โทรศัพท์" },
            { id: 11, title: "Journey Home", prod: "Nomad Prod.", time: "22 นาที", desc: "Road Movie ของพี่น้องกับการนำอัฐิพ่อกลับบ้าน" },
            { id: 12, title: "Pixel Heart", prod: "Indie Game", time: "10 นาที", desc: "แอนิเมชันตัวละครเกม 8-bit" },
            { id: 13, title: "แดดสุดท้าย", prod: "Golden Hour", time: "13 นาที", desc: "การเผชิญหน้ากับความโดดเดี่ยวของหญิงชรา" },
            { id: 14, title: "Hidden Code", prod: "Dev Cinema", time: "16 นาที", desc: "โปรแกรมเมอร์พบรหัสลับที่อาจเปลี่ยนประวัติศาสตร์" },
            { id: 15, title: "The Script", prod: "Writers Block", time: "19 นาที", desc: "เมื่อชีวิตจริงดำเนินไปตามบทหนังที่เขียน" },
            { id: 16, title: "Memoirs", prod: "Memory Picture", time: "20 นาที", desc: "บันทึกของนิสิตวิชาภาพยนตร์ในรอบ 10 ปี" }
        ];

        const grid = document.getElementById('movie-grid');
        movies.forEach(m => {
            // แก้ไขตรงนี้ให้ตรงกับชื่อไฟล์ใน GitHub ของคุณ Oak
            const posterSrc = `poster${m.id}.jpg.jpg`; 
            
            grid.innerHTML += `
                <div class="movie-card rounded-2xl overflow-hidden shadow-lg">
                    <img src="${posterSrc}" alt="${m.title}" class="w-full h-[400px] object-cover">
                    <div class="p-5 flex flex-col flex-grow">
                        <h3 class="text-lg font-bold text-[--gold] mb-1">${m.title}</h3>
                        <p class="text-[10px] text-gray-500 mb-3">${m.prod} | ${m.time}</p>
                        <p class="text-xs text-gray-400 line-clamp-3 mb-6">${m.desc}</p>
                        <button onclick="openBooking('${m.title}')" class="mt-auto w-full btn-gold py-3 rounded-xl text-xs uppercase tracking-widest hover:bg-[#f1c40f] transition">จองตั๋ว</button>
                    </div>
                </div>
            `;
        });

        function openBooking(title) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.add('hidden');
        }

        function confirmBooking(e) {
            e.preventDefault();
            alert("จองสำเร็จ! (ระบบจำลอง)");
            closeModal();
        }
    </script>
</body>
</html>
