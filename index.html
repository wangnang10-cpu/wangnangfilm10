        .seat-badge { position: absolute; bottom: 10px; right: 10px; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1); z-index: 10; }

        .prod-text-premium { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; letter-spacing: 0.1em; background-size: 200% auto; animation: textShine 4s linear infinite; display: inline-block; }

        }
        .syn-poster-frame { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), 0 0 20px rgba(212, 175, 55, 0.2); border: 2px solid rgba(255, 255, 255, 0.05); }
        .syn-director-capsule { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); padding: 8px 24px; border-radius: 100px; display: inline-block; }

        .btn-oscar, .cr-btn { position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: linear-gradient(to bottom, var(--gold-light), var(--gold)); color: black; border: 1px solid #fff; }
        .btn-oscar:hover, .cr-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(212, 175, 55, 0.4); }
        
        #book-btn-direct { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f); background-size: 200% auto; color: #1a1a1a; font-weight: 900; padding: 18px; border-radius: 9999px; transition: all 0.4s; border: none; box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
        #book-btn-direct:hover { background-position: right center; transform: translateY(-4px); box-shadow: 0 15px 30px rgba(212,175,55,0.4); }

        .input-premium { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.15); width: 100%; padding: 0.8rem; border-radius: 12px; color: white; outline: none; transition: all 0.3s ease; }
        .input-premium:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2); }
        select.input-premium option { background-color: #222 !important; color: #fff !important; }

        .status-green { background-color: #4ade80; animation: pulse-green 2s infinite; }
        .status-yellow { background-color: #fb923c; animation: pulse-yellow 1.5s infinite; }
        .status-red { background-color: #ff4d4d; animation: pulse-red 1s infinite; }
        
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6); } 50% { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); } }
        @keyframes pulse-yellow { 0%, 100% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.6); } 50% { box-shadow: 0 0 0 8px rgba(251, 146, 60, 0); } }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.6); } 50% { box-shadow: 0 0 0 8px rgba(255, 77, 77, 0); } }

        function init() {
            const track = document.getElementById('slider-track');
            let sliderHTML = ''; const v = new Date().getTime();
            for(let i=1; i<=17; i++) { sliderHTML += `<div class="slide"><img src="prod${i}.png?v=${v}" onerror="this.src='prod${i}.PNG?v=${v}'"></div>`; }
            track.innerHTML = sliderHTML + sliderHTML;

            const grid = document.getElementById('movie-grid');
            movies.forEach(m => {
                const rInfo = {1:"10:45 - 12:00", 2:"12:15 - 14:00", 3:"14:15 - 16:00", 4:"16:15 - 18:00", 5:"18:45 - 21:00"};
                grid.innerHTML += `
                    <div class="movie-card flex flex-col h-full" onclick="openSynopsis(${m.id})">
                        <img src="${m.post}?v=${v}" onerror="this.src='https://via.placeholder.com/400x560/222/D4AF37?text=WN10'">
                        <div id="badge-movie-${m.id}" class="seat-badge">Loading...</div>
                        <div class="p-6 flex flex-col flex-grow bg-black/60">
                            <h3 class="text-xl font-bold text-white mb-1 truncate font-th-title">${m.title}</h3>
                            <p class="text-[11px] font-bold uppercase mb-4 prod-text-premium">${m.prod}</p>
                            <div class="mt-auto text-xs text-gray-400 font-bold"><p>ความยาว: ${m.len} นาที</p><p class="text-[--gold]">รอบ : ${m.round} เวลา : ${rInfo[m.round]}</p></div>
                        </div>
                    </div>`;
                db.ref(`capacities/round${m.round}`).on('value', snap => {
                    const maxSeats = (m.round == 1) ? 187 : 200;
                    const left = maxSeats - (snap.val() || 0);
                    const badge = document.getElementById(`badge-movie-${m.id}`);
                    if(badge) {
                        let color = left <= 20 ? "#ff4d4d" : (left <= 100 ? "#fb923c" : "#4ade80");
                        badge.style.color = color; badge.innerHTML = `Seats: ${left <= 0 ? 'FULL' : left}`;
                    }
                });
            });
        }

        window.openSynopsis = function(id) {
            const m = movies.find(x => x.id === id);
            const rInfo = {1:"10:45 - 12:00", 2:"12:15 - 14:00", 3:"14:15 - 16:00", 4:"16:15 - 18:00", 5:"18:45 - 21:00"};
            document.getElementById('md-poster').src = m.post;
            document.getElementById('md-title').innerText = m.title;
            document.getElementById('md-prod').innerText = m.prod;
            document.getElementById('md-director').innerText = `กำกับโดย : ${m.director}`;
            document.getElementById('md-len').innerText = `ความยาว: ${m.len} นาที`;
            document.getElementById('md-round').innerText = `รอบที่ ${m.round} เวลา : ${rInfo[m.round]}`;
            document.getElementById('md-desc').innerText = m.desc;
            document.getElementById('book-btn-direct').onclick = function() { closeModal('synopsis-modal'); selectRound(parseInt(m.round), rInfo[m.round]); };
            openModal('synopsis-modal');
        };

        async function confirmBooking(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            try {
                const count = parseInt(document.getElementById('u_seats').value);
                const phone = document.getElementById('u_phone').value;
                btn.disabled = true; btn.innerText = "กำลังดำเนินการ...";
                const snapCheck = await db.ref(`bookings/${phone}/R${currentRoundID}`).once('value');
                if(snapCheck.exists()) { 
                    alert("เบอร์นี้ได้จองรอบนี้ไปแล้ว!"); 
                    btn.disabled = false; btn.innerText="ยืนยันการจองทั้งหมด"; 
                    return; 
                }
                db.ref(`capacities/round${currentRoundID}`).transaction(curr => {
                    const currentSeats = curr || 0;
                    const maxForThisRound = (currentRoundID == 1) ? 187 : 200;
                    return (currentSeats + count <= maxForThisRound) ? currentSeats + count : undefined;
                }, async (err, comm, snapCap) => {
                    try {
                        if (err) {
                            alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล กรุณาลองใหม่");
                            btn.disabled = false; btn.innerText="ยืนยันการจองทั้งหมด";
                        } else if (!comm) {
                            alert("ขออภัย! ที่นั่งในรอบนี้ไม่เพียงพอ");
                            btn.disabled = false; btn.innerText="ยืนยันการจองทั้งหมด";
                        } else {
                            let tickets = [];
                            for(let i=1; i<=count; i++) {
                                const type = document.getElementById(`type_${i}`).value; 
                                const data = { 
                                    name: document.getElementById(`n${i}`).value, 
                                    prefix: document.getElementById(`p${i}`).value, 
                                    userType: type, 
                                    studentID: document.getElementById(`sid${i}`)?.value || "-", 
                                    academy: document.getElementById(`aca${i}`)?.value || "-", 
                                    phone: phone, 
                                    round: currentRoundID, 
                                    ticketID: `WN-R${currentRoundID}-${String(snapCap.val()-(count-i)).padStart(3,'0')}`, 
                                    seats: count 
                                };
                                tickets.push(data); 
                                fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) }).catch(e => console.log("Sheet Error:", e));
                            }
                            await db.ref(`bookings/${phone}/R${currentRoundID}`).set({ group: tickets }); 
                            showMultiTickets(tickets); 
                        }
                    } catch(innerErr) {
                        console.error(innerErr);
                        alert("เกิดข้อผิดพลาดภายใน: " + innerErr.message);
                        btn.disabled = false; btn.innerText="ยืนยันการจองทั้งหมด";
                    }
                });
            } catch(error) {
                console.error(error);
                alert("เกิดข้อผิดพลาดในระบบ: " + error.message);
                btn.disabled = false; btn.innerText="วยืนยันการจองทั้งหมด";
            }
        }

        async function unifiedSearch() {
            const phone = document.getElementById('check_phone').value;
            if(!phone || phone.length < 10) return alert("กรุณากรอกเบอร์โทรศัพท์ 10 หลักให้ครบถ้วน");
            const snap = await db.ref(`bookings/${phone}`).once('value');
            if(!snap.exists()) return alert("ไม่พบข้อมูลการจองสำหรับเบอร์นี้");
            let allTickets = [];
            snap.forEach(roundSnap => { allTickets = allTickets.concat(roundSnap.val().group); });
            showMultiTickets(allTickets);
        }

        function showMultiTickets(tickets) {
            const container = document.getElementById('ticket-list'); 
            container.innerHTML = '';
            tickets.forEach((t, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = "flex flex-col items-center relative gap-6 w-full max-w-4xl";
                const canvas = document.createElement('canvas');
                canvas.id = `ticket-canvas-${i}`;
                canvas.className = "w-full rounded-lg shadow-[0_25px_50px_-12px_rgba(0,0,0,1)] relative z-10 transition-transform duration-700 hover:scale-[1.02]";
                const saveBtn = document.createElement('button');
                saveBtn.className = "bg-gradient-to-r from-[--gold] to-[--gold-light] text-black px-10 py-4 rounded-full font-bold text-sm tracking-widest shadow-xl transition-all active:scale-95 flex items-center gap-2";
                saveBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> บันทึกตั๋วภาพยนตร์ใบที่ ${i+1}`;
                saveBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.download = `WN10_Ticket_${t.ticketID}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                };
                const divider = document.createElement('div');
                divider.className = "w-full max-w-md h-[1px] bg-gradient-to-r from-transparent via-[--gold] to-transparent opacity-30 mt-6 mb-2";
                wrapper.appendChild(canvas);
                wrapper.appendChild(saveBtn);
                if (i < tickets.length - 1) wrapper.appendChild(divider);
                container.appendChild(wrapper);
                renderTicketOnCanvas(canvas, t);
            });
            closeModal('booking-modal'); closeModal('check-ticket-modal'); openModal('ticket-modal');
            const btn = document.getElementById('submit-btn');
            if(btn) { btn.disabled = false; btn.innerText="ยืนยันการจองทั้งหมด"; }
        }

        function renderTicketOnCanvas(canvas, data) {
            const ctx = canvas.getContext('2d'), img = new Image();
            img.src = `ticket-${data.round}.png?v=` + new Date().getTime(); 
            img.onload = () => {
                canvas.width = 1200; canvas.height = 492;
                ctx.drawImage(img, 0, 0, 1200, 492);
                ctx.fillStyle = (data.round == 2) ? "black" : "white"; 
                ctx.textBaseline = "middle"; 
                ctx.textAlign = "left"; 
                ctx.font = "bold 20px Anuphan"; 
                ctx.fillText(data.name || "-", 460, 215, 200); 
                ctx.font = "bold 20px Anuphan"; 
                ctx.fillText(data.ticketID || "-", 660, 215); 
                ctx.font = "bold 22px Anuphan"; 
                ctx.fillText(data.phone || "-", 460, 290); 
            };
            img.onerror = () => {
                canvas.width = 1200; canvas.height = 492;
                ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 0, 1200, 492);
                ctx.fillStyle = "white"; ctx.font = "bold 40px Anuphan";
                ctx.fillText(`! ไม่สามารถโหลดไฟล์: ticket-${data.round}.png`, 300, 200);
            };
        }

        function openRoundSelection() {
            const list = document.getElementById('round-list'); list.innerHTML = '';
            const times = {1:"10:45 - 12:00", 2:"12:15 - 14:00", 3:"14:15 - 16:00", 4:"16:15 - 18:00", 5:"18:45 - 21:00"};
            [1,2,3,4,5].forEach((rid, index) => {
                const moviesInRound = movies.filter(m => m.round == rid).map(m => m.title);
                db.ref(`capacities/round${rid}`).on('value', snap => {
                    const maxForThisRound = (rid == 1) ? 187 : 200;
                    const left = maxForThisRound - (snap.val() || 0);
                    const isFull = left <= 0;
                    let dotClass = isFull ? "bg-gray-500" : (left > 100 ? "status-green" : (left > 20 ? "status-yellow" : "status-red"));
                    let textColor = isFull ? "#6b7280" : (left > 100 ? "#4ade80" : (left > 20 ? "#fb923c" : "#ff4d4d"));
                    const card = document.createElement('div'); 
                    card.className = `round-card-premium p-6 flex justify-between items-center animate-round ${isFull ? 'opacity-40 grayscale cursor-not-allowed' : ''}`;
                    card.style.animationDelay = `${index * 0.1}s`; 
                    if(!isFull) card.onclick = () => selectRound(rid, times[rid]); 
                    card.innerHTML = `<div class="flex-1"><p class="text-white font-bold text-xl mb-1 flex items-center"><span class="status-dot ${dotClass}"></span>ROUND 0${rid} <span class="text-[--gold] text-sm ml-2 font-normal italic">${times[rid]}</span></p><p class="text-[11px] text-gray-300 italic line-clamp-2 max-w-sm pl-6">${moviesInRound.join(", ")}</p></div><div class="text-right pl-6 border-l border-white/10 shrink-0"><p class="text-3xl font-oscar font-bold" style="color: ${textColor}">${isFull ? 'FULL' : left}</p><p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Seats Left</p></div>`;
                    const exist = document.getElementById(`rcard-${rid}`); 
                    if(exist) exist.replaceWith(card); else list.appendChild(card); card.id = `rcard-${rid}`;
                });
            });
            openModal('round-modal');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); if(id==='booking-modal') generateGuestFields(1); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function selectRound(id, time) { currentRoundID = id; currentRoundTime = time; document.getElementById('booking-info').innerText = `กำลังจอง : ROUND 0${id} (${time})`; closeModal('round-modal'); openModal('booking-modal'); }
        window.onload = init;
    </script>
</body>
